<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="findwaybus2_styleguide_css" />
    <link rel="stylesheet" href="findwaybus2_style.css" />
    <style>
      .clickable {
        cursor: pointer; /* 클릭할 수 있도록 커서를 변경 */
      }
    </style>
  </head>
  <body>
    <div class="div-wrapper">
      <div class="div">
        <div class="stop-edge">
          <div class="view">
            <div class="text-wrapper">버스</div>
            <div class="bus-electric"></div>
            <a href="#">
              <img class="vector" src="img/busblack.svg" />
            </a>
          </div>
          <div class="overlap-group-wrapper">
            <div class="overlap-group">
              <div class="text-wrapper-2">도보</div>
              <a href="#">
                <img class="motion-sensor" src="img/motion-sensor.png" />
              </a>
            </div>
          </div>
        </div>
        <img class="line" src="img/line-2.svg" />
        <div class="text-wrapper-3">도착지를 입력해주세요</div>
        <div class="view-2">
          <div class="frame">
            <input type="text" placeholder="출발지 입력" onkeydown="if(event.key === 'Enter') { window.location.href='direction_list.html'; }" />
          </div>
                    <div class="frame-2"><div class="text-wrapper-5">다이소 대구 신당점</div></div>
          <div class="frame-3"></div>
          <div class="overlap">
            <img class="group" src="img/x.svg" />
          </div>
          <div class="overlap-2">
            <img class="arrow-left" src="img/arrow-top.png" /> <img class="arrow-left-2" src="img/arrow-down.png" />
          </div>
        </div>
        <div class="view-3">
          <div class="map-spicy"><div class="text-wrapper-6">map spicy</div></div>
          <div class="image-wrapper">
            <img class="image" src="img/mapspicy.png" />
          </div>
          <img class="menu clickable" src="img/menu.svg" onclick="handleMenuClick()" /> <!-- 클릭 가능하게 설정 -->
        </div>
      </div>
    </div>

    <script>
      function handleMenuClick() {
        // 원하는 동작 추가
        console.log("Menu icon clicked!");
      }
    </script>
  </body>
</html>
